settings:
    lib_name: OSU350
    units:
        pulling_resistance: kOhm
    named_nodes:
        primary_ground:
            name: GND
    cell_defaults:
        netlist:    spice/osu035_stdcells.sp
        models:     [models/ami035.m]
        loads:      [0.015, 0.04, 0.08, 0.2, 0.4]
        data_slews: [0.06, 0.18, 0.42, 0.6, 1.2]
cells:
    AND2X1:
        area:       128
        inputs:     [A,B]
        outputs:    ['Y']
        functions:  [Y=A&B]
    AND2X2:
        area:       128
        inputs:     [A,B]
        outputs:    ['Y']
        functions:  [Y=A&B]
    AOI21X1:
        area:       128
        inputs:     [A,B,C]
        outputs:    ['Y']
        functions:  [Y=!((A&B)|C)]
    AOI22X1:
        area:       160
        inputs:     [A,B,C,D]
        outputs:    ['Y']
        functions:  [Y=!((A&B)|(C&D))]
    BUFX2:
        area:       96
        inputs:     [A]
        outputs:    ['Y']
        functions:  [Y=A]
    BUFX4:
        area:       128
        inputs:     [A]
        outputs:    ['Y']
        functions:  [Y=A]
    CLKBUF1:
        area:       288
        inputs:     [A]
        outputs:    ['Y']
        functions:  [Y=A]
    CLKBUF2:
        area:       416
        inputs:     [A]
        outputs:    ['Y']
        functions:  [Y=A]
    CLKBUF3:
        area:       544
        inputs:     [A]
        outputs:    ['Y']
        functions:  [Y=A]
    DFFNEGX1:
        area:       384
        clock:      negedge CLK
        inputs:     [D]
        outputs:    [Q]
        state:      [DS0000 = D]
        functions:  [Q <= DS0000]
        clock_slews: [0.06, 0.3, 0.6] # related_pin
        metastability_constraint_load: 0.24  # in units specified by settings.units.capacitive_load
        metastability_constraint_sweep_samples: 40
    DFFPOSX1:
        area:       384
        clock:      posedge CLK
        inputs:     [D]
        outputs:    [Q]
        state:      [DS0000 = D]
        functions:  [Q <= DS0000]
        clock_slews: [0.06, 0.3, 0.6] # related_pin
        metastability_constraint_load: 0.24  # in units specified by settings.units.capacitive_load
        metastability_constraint_sweep_samples: 40
    DFFSR:
        area:       704
        clock:      posedge CLK
        set:        negedge S
        reset:      negedge R
        inputs:     [D]
        outputs:    [Q]
        state:      [DS0000 = D]
        functions:  [Q <= DS0000]
        clock_slews: [0.06, 0.3, 0.6] # related_pin
        metastability_constraint_load: 0.24  # in units specified by settings.units.capacitive_load
        metastability_constraint_sweep_samples: 40
    FAX1:
        area:       480
        inputs:     [A, B, C]
        outputs:    [YC, YS]
        functions:
            - YC=(A&B)|(C&(A^B))
            - YS=A^B^C
    HAX1:
        area:       320
        inputs:     [A, B]
        outputs:    [YC, YS]
        functions:
            - YC=A&B
            - YS=A^B
    INVX1:
        area:       64
        inputs:     [A]
        outputs:    ['Y']
        functions:  [Y=!A]
    INVX2:
        area:       64
        inputs:     [A]
        outputs:    ['Y']
        functions:  [Y=!A]
    INVX4:
        area:       96
        inputs:     [A]
        outputs:    ['Y']
        functions:  [Y=!A]
    INVX8:
        area:       160
        inputs:     [A]
        outputs:    ['Y']
        functions:  [Y=!A]
    # LATCH:
    #     clock:      negedge CLK
    #     inputs:     [D]
    #     outputs:    [Q]
    #     functions:  [Q<=D]
    MUX2X1:
        area:       192
        inputs:     [A,B,S]
        outputs:    ['Y']
        functions:  [Y=!((S&A)|((!S)&B))]
    NAND2X1:
        area:       96
        inputs:     [A,B]
        outputs:    ['Y']
        functions:  [Y=!(A&B)]
    NAND3X1:
        area:       144
        inputs:     [A,B,C]
        outputs:    ['Y']
        functions:  [Y=!(A&B&C)]
    NOR2X1:
        area:       96
        inputs:     [A,B]
        outputs:    ['Y']
        functions:  [Y=!(A|B)]
    NOR3X1:
        area:       256
        inputs:     [A,B,C]
        outputs:    ['Y']
        functions:  [Y=!(A|B|C)]
    OAI21X1:
        area:       92
        inputs:     [A,B,C]
        outputs:    ['Y']
        functions:  [Y=!((A|B)&C)]
    OAI22X1:
        area:       160
        inputs:     [A,B,C,D]
        outputs:    ['Y']
        functions:  [Y=!((A|B)&(C|D))]
    OR2X1:
        area:       128
        inputs:     [A,B]
        outputs:    ['Y']
        functions:  [Y=A|B]
    OR2X2:
        area:       128
        inputs:     [A,B]
        outputs:    ['Y']
        functions:  [Y=A|B]
    # PADINC:
    #     area:       12000
    #     inputs:     [YPAD]
    #     outputs:    [DI]
    #     functions:  [DI=YPAD]
    # PADINOUT:
    # PADOUT:
        # area:       12000
        # inputs:     [DO]
        # outputs:    [YPAD]
        # functions:  [YPAD=DO]
    # TBUFX1:
    # TBUFX2:
    XNOR2X1:
        area:       224
        inputs:     [A,B]
        outputs:    ['Y']
        functions:  [Y=!(A^B)]
    XOR2X1:
        area:       224
        inputs:     [A,B]
        outputs:    ['Y']
        functions:  [Y=A^B]
