settings:
    lib_name: gf180mcu_osu_sc_9t_example_hspice
    simulation:
        backend: hspice
    cell_defaults:
        netlist: gf180mcu/spice/osu_sc_9t.spice
        models:
            - gf180mcu/models/sm141064.spice typical
            - gf180mcu/models/design.spice
        data_slews:  [0.0706, 0.1903, 0.5123, 1.3794, 3.7140]
        loads:       [0.0013, 0.0048, 0.0172, 0.0616, 0.2206, 0.7901]
        clock_slews: [0.0699991, 2.64574]
        metastability_constraint_load: 0.24
cells:
    gf180mcu_osu_sc_gp9t3v3__aoi21_1:
        inputs: [A0, A1, B]
        outputs: ['Y']
        functions: [Y=(!A0&!B) | (!A1&!B)]
    gf180mcu_osu_sc_gp9t3v3__aoi22_1:
        inputs: [A0, A1, B0, B1]
        outputs: ['Y']
        functions: [Y=(!A0&!B0) | (!A0&!B1) | (!A1&!B0) | (!A1&!B1)]
    gf180mcu_osu_sc_gp9t3v3__buf_1:
        inputs: [A]
        outputs: ['Y']
        functions: [Y=A]
    gf180mcu_osu_sc_gp9t3v3__dff_1:
        functions:
            - Q <= D
            - QN <= !D
        clock: posedge clk
        state:
            - IQ = Q
            - IQN = QN
        pairs: [Q QN]
        # Limit DFFS to 1 slew/load/clk_slew corner, as this takes a long time
        data_slews:  [0.0706]
        loads:       [0.2206]
        clock_slews: [0.0699991]
    gf180mcu_osu_sc_gp9t3v3__mux2_1:
        inputs: [A, B, SEL]
        outputs: ['Y']
        functions: [Y=(A&!SEL) | (B&SEL)]
    gf180mcu_osu_sc_gp9t3v3__nand2_1:
        inputs: [A, B]
        outputs: ['Y']
        functions: [Y=!(A&B)]
    gf180mcu_osu_sc_gp9t3v3__nor2_1:
        inputs: [A, B]
        outputs: ['Y']
        functions: [Y=!(A|B)]
    gf180mcu_osu_sc_gp9t3v3__oai21_1:
        inputs: [A0, A1, B]
        outputs: ['Y']
        functions: [Y=(!A0&!A1) | (!B)]
    gf180mcu_osu_sc_gp9t3v3__oai22_1:
        inputs: [A0, A1, B0, B1]
        outputs: ['Y']
        functions: [Y=(!A0&!A1) | (!B0&!B1)]
    gf180mcu_osu_sc_gp9t3v3__oai31_1:
        inputs: [A0, A1, A2, B]
        outputs: ['Y']
        functions: [Y=(!A0&!A1&!A2)|(!B)]
    gf180mcu_osu_sc_gp9t3v3__or2_1:
        inputs: [A, B]
        outputs: ['Y']
        functions: [Y=A|B]
    gf180mcu_osu_sc_gp9t3v3__xnor2_1:
        inputs: [A, B]
        outputs: ['Y']
        functions: [Y=!(A^B)]
    gf180mcu_osu_sc_gp9t3v3__xor2_1:
        inputs: [A, B]
        outputs: ['Y']
        functions: [Y=A^B]
