settings:
    lib_name: osu350_adder_example
    units:
        pulling_resistance: kOhm # This is the only unit that differs from the defaults
    named_nodes:
        primary_ground:
            name: GND
    cell_defaults: # The key-value pairs below get copied to all cell configurations
        netlist:    osu350/spice/osu035_stdcells.sp
        models:     [osu350/models/ami035.sp]
        data_slews: [0.015, 0.04, 0.08, 0.2, 0.4]
        loads:      [0.06, 0.18, 0.42, 0.6, 1.2]
cells:
    FAX1:
        area: 480
        functions:
            - YC=(A&B)|(C&(A^B))
            - YS=A^B^C
    HAX1:
        area: 320
        functions:
            - YC=A&B
            - YS=A^B
        loads: [0.012, 0.036, 0.06] # This overrides the value from cell_defaults
