name: Tests
run-name: ${{ github.actor }} is testing CharLib

on: [push, pull_request]

jobs:

  Regression:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: "Install CharLib"
        run: |
          pip install -e .[docs]

      - name: "Run regression tests"
        run: |
          pytest

  Characterize-osu035:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: "Install Charlib"
        run: |
          sudo apt update && sudo apt install -y libngspice0-dev
          pip install -e .

      - name: "Download osu035 cells"
        run: |
          pushd test/pdks/osu350
          bash fetch_spice.sh
          popd

      - name: "Characterize"
        run: |
          pushd test/pdks/osu350
          charlib run osu350.yml -o charlib-test-osu035.nldm.lib -j16
          popd

      - name: "Upload results"
        uses: actions/upload-artifact@v4
        with:
          name: osu035-results
          path: |
            test/pdks/osu350/charlib-test-osu035.nldm.lib

  Characterize-gf180mcu_osu_sc:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: "Install CharLib"
        run: |
          sudo apt update && sudo apt install -y libngspice0-dev
          pip install -e .

      - name: "Download gf180mcu_osu_sc"
        run: |
          pushd test/pdks/gf180mcu_osu_sc
          mkdir models
          curl https://raw.githubusercontent.com/fossi-foundation/globalfoundries-pdk-libs-gf180mcu_fd_pr/refs/heads/main/models/ngspice/sm141064.spice > models/sm141064.spice
          curl https://raw.githubusercontent.com/fossi-foundation/globalfoundries-pdk-libs-gf180mcu_fd_pr/refs/heads/main/models/ngspice/design.spice > models/design.spice
          git clone https://github.com/stineje/globalfoundries-pdk-libs-gf180mcu_osu_sc
          popd

      - name: "Characterize 9t (excluding sequential)"
        run: |
          pushd test/pdks/gf180mcu_osu_sc
          charlib run 9t.yaml -o charlib-test-gf180mcu_osu_sc_9t_comb.nldm.lib -j4 -f add and aoi buf inv mux nand nor oai or xnor xor
          popd

      - name: "Characterize 9t (sequential only)"
        run: |
          pushd test/pdks/gf180mcu_osu_sc
          charlib run 9t.yaml -o charlib-test-gf180mcu_osu_sc_9t_seq.nldm.lib -j8 -f dff dlat
          popd

      - name: "Characterize 12t (excluding sequential)"
        run: |
          pushd test/pdks/gf180mcu_osu_sc
          charlib run 12t.yaml -o charlib-test-gf180mcu_osu_sc_12t_comb.nldm.lib -j4 -f add and aoi buf inv mux nand nor oai or xnor xor
          popd

      - name: "Characterize 12t (sequential only)"
        run: |
          pushd test/pdks/gf180mcu_osu_sc
          charlib run 12t.yaml -o charlib-test-gf180mcu_osu_sc_12t_seq.nldm.lib -j8 -f dff dlat
          popd

      - name: "Upload results"
        uses: actions/upload-artifact@v4
        with:
          name: gf180mcu_osu_sc-results
          path: |
            test/pdks/gf180mcu_osu_sc/charlib-test-gf180mcu_osu_sc_9t_comb.nldm.lib
            test/pdks/gf180mcu_osu_sc/charlib-test-gf180mcu_osu_sc_9t_seq.nldm.lib
            test/pdks/gf180mcu_osu_sc/charlib-test-gf180mcu_osu_sc_12t_comb.nldm.lib
            test/pdks/gf180mcu_osu_sc/charlib-test-gf180mcu_osu_sc_12t_seq.nldm.lib
